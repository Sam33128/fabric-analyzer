<!DOCTYPE html>
<html>
<head>
    <title>Fabric Analyzer</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f7fa;
        }

        .upload-card{
            max-width:700px;
            margin:60px auto;
            padding:30px;
            border-radius:20px;
            background:white;
            box-shadow:0 0 20px rgba(0,0,0,.08);
        }

        .preview{
            max-width:100%;
            max-height:300px;
            display:none;
            margin-top:20px;
            border-radius:10px;
        }

        .loader{
            display:none;
        }
    </style>

</head>
<body>

<div class="container">

    <div class="upload-card">

        <h1 class="text-center mb-4">
            Fabric Analyzer
        </h1>

        <p class="text-center text-muted">
            Upload a garment image or fabric texture image
        </p>

        <form
            action="/analyze"
            method="post"
            enctype="multipart/form-data"
            onsubmit="showLoader()">

            <input
                class="form-control"
                type="file"
                name="file"
                accept="image/*"
                required
                onchange="previewImage(event)">

            <img
                id="preview"
                class="preview">

            <div class="text-center mt-4">

                <button
                    class="btn btn-primary btn-lg"
                    type="submit">

                    Analyze Image

                </button>

            </div>

        </form>

        <div
            id="loader"
            class="loader text-center mt-4">

            <div class="spinner-border"></div>

            <p class="mt-3">
                Analyzing Image...
            </p>

        </div>

    </div>

</div>

<script>

function previewImage(event){

    const img =
        document.getElementById("preview");

    img.src =
        URL.createObjectURL(
            event.target.files[0]
        );

    img.style.display = "block";
}

function showLoader(){

    document.getElementById(
        "loader"
    ).style.display = "block";
}

</script>

</body>
</html>
